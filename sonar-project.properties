# 项目唯一标识
sonar.projectKey=HiveMind_RAG
sonar.projectName=HiveMind Agentic RAG

# 源码位置
sonar.sources=backend,frontend/src
# 排除项
sonar.exclusions=backend/tests/**,frontend/node_modules/**,**/dist/**

# 语言设置（通常由 Sonar 自动检测，但可以显式声明）
# sonar.language=py,js,ts

# 覆盖率文件位置（如果你在 CI 里跑了测试并生成了覆盖率报告）
# sonar.python.coverage.reportPaths=backend/coverage.xml
