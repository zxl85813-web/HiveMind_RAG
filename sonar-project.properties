# =============================================================================
# SonarQube Configuration — HiveMind RAG
# =============================================================================

# ── 项目标识 ────────────────────────────────────────────────────────────────
sonar.projectKey=HiveMind_RAG
sonar.projectName=HiveMind Agentic RAG
sonar.projectVersion=0.1.0

# ── 源码位置 ────────────────────────────────────────────────────────────────
sonar.sources=backend/app,frontend/src

# ── 测试文件位置 ────────────────────────────────────────────────────────────
sonar.tests=backend/tests,frontend/e2e

# ── 排除项 ──────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.venv/**,\
  **/migrations/**,\
  **/alembic/versions/**,\
  **/__pycache__/**,\
  **/htmlcov/**,\
  **/allure-results/**,\
  **/allure-report/**

sonar.test.exclusions=\
  **/tests/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/e2e/**,\
  **/conftest.py

# ── Python 配置 ─────────────────────────────────────────────────────────────
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# ── TypeScript / JavaScript 配置 ────────────────────────────────────────────
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ── 编码 ────────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
