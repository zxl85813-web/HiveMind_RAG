<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Stress Test (5,000 Nodes, 10,000 Edges)</title>
    <!-- Include force-graph standalone -->
    <script src="https://unpkg.com/force-graph"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0b0c10; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #graph-container { width: 100%; height: 100%; }
        #stats { position: absolute; top: 10px; left: 10px; padding: 15px; background: rgba(0,0,0,0.7); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .stat-value { font-size: 24px; font-weight: bold; color: #66fcf1; }
        .loading { color: #f2a900; }
    </style>
</head>
<body>
    <div id="stats">
        <div>Nodes: <span class="stat-value">5,000</span></div>
        <div>Edges: <span class="stat-value">10,000</span></div>
        <div id="status" class="loading">Status: Generating Data...</div>
        <div id="fps">FPS: <span class="stat-value">--</span></div>
    </div>
    <div id="graph-container"></div>

    <script>
        const NUM_NODES = 5000;
        const NUM_EDGES = 10000;
        
        // 1. Generate Massive Data
        const nodes = Array.from({ length: NUM_NODES }).map((_, i) => ({
            id: `node_${i}`,
            name: `Concept ${i}`,
            val: Math.random() * 5 + 2,
            color: i % 3 === 0 ? '#45a29e' : (i % 3 === 1 ? '#66fcf1' : '#c5c6c7')
        }));
        
        const links = Array.from({ length: NUM_EDGES }).map(() => ({
            source: `node_${Math.floor(Math.random() * NUM_NODES)}`,
            target: `node_${Math.floor(Math.random() * NUM_NODES)}`
        }));
        
        const gData = { nodes, links };
        
        document.getElementById('status').innerText = 'Status: Rendering Graph...';
        document.getElementById('status').style.color = '#f2a900';
        
        const startTime = performance.now();
        
        // 2. Render using ForceGraph (same underlying engine as react-force-graph)
        const Graph = ForceGraph()(document.getElementById('graph-container'))
            .graphData(gData)
            .nodeColor('color')
            .nodeRelSize(6)
            .linkColor(() => 'rgba(255, 255, 255, 0.05)')
            .backgroundColor('#0b0c10')
            .onEngineStop(() => {
                Graph.zoomToFit(400, 20);
                document.getElementById('status').innerText = 'Status: Stable Layout';
                document.getElementById('status').style.color = '#66fcf1';
            });
            
        // Match frontend physics configurations
        Graph.d3Force('charge').strength(-30); // Reduced repelling force to handle massive graph smoothly
        Graph.d3Force('link').distance(40);
        
        const initTime = performance.now() - startTime;
        console.log(`Canvas initialized in ${initTime.toFixed(2)} ms`);
        
        // Simple FPS counter
        let times = [];
        let fps;
        
        function refreshLoop() {
            window.requestAnimationFrame(() => {
                const now = performance.now();
                while (times.length > 0 && times[0] <= now - 1000) {
                    times.shift();
                }
                times.push(now);
                fps = times.length;
                document.querySelector('#fps .stat-value').innerText = fps;
                refreshLoop();
            });
        }
        refreshLoop();

        // 模拟用户交互（缩小视野观察总体）
        setTimeout(() => {
            Graph.zoom(0.3, 2000);
        }, 1000);

        // 模拟拖拽（由于是纯脚本不好做，我们可以做自动旋转）
        let angle = 0;
        setInterval(() => {
            Graph.cameraPosition({
                x: 1000 * Math.sin(angle),
                z: 1000 * Math.cos(angle)
            });
            angle += Math.PI / 300;
        }, 50);
    </script>
</body>
</html>
