# =============================================================================
# Release CI — release/* → main 的 PR 全量检查
# =============================================================================
# 跑完整套件: Lint + Type + Unit + Integration + 安全扫描
# =============================================================================
name: Release CI (Full Gate)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/release-ci.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  backend-release-gate:
    name: 🐍 Backend Release Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]" && pip install types-aiofiles bandit safety

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter)
        run: black --check --diff .

      - name: Mypy (Type Check)
        run: mypy app/ --ignore-missing-imports

      - name: "Security Bandit SAST Scan"
        run: bandit -r app/ -ll

      - name: "Security Safety Dependency CVE Scan"
        run: safety check --json || true

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=false
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=release-ci-test-secret-key
          EOF

      - name: Run Full Tests (Coverage > 80%)
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --alluredir=allure-results \
            -o "addopts="

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-release
          path: backend/coverage.xml

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-backend-release
          path: backend/allure-results/
          retention-days: 30

  frontend-release-gate:
    name: ⚛️ Frontend Release Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint (Strict)
        run: npm run lint

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Run Tests + Coverage
        run: npm run test:unit

      - name: Production Build
        run: npm run build

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-release
          path: frontend/coverage/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-frontend-release
          path: frontend/allure-results/
          retention-days: 30

  tag-on-merge:
    name: 🏷️ Auto Tag on Release Merge
    runs-on: ubuntu-latest
    needs: [backend-release-gate, frontend-release-gate]
    if: github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
