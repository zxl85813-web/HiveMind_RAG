# 功能分支快速检查 CI (feature/fix/hotfix → develop 的 PR 触发)
# 只跑 Lint + Type + Unit Test，快速反馈，不跑慢速的集成/E2E
name: Feature CI (Fast Check)

on:
  pull_request:
    branches:
      - develop       # 功能分支合入 develop 时触发
      - 'release/**'  # fix 分支合入 release 时也触发
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/feature-ci.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  SG7_MAX_ERROR_BUDGET: '0.70'
  SG7_MAX_DEGRADE_TRIGGER_RATIO: '0.80'
  SG7_MAX_MTTR_SEC: '60'
  SG3_MIN_COST_REDUCTION_RATIO: '0.10'
  SG3_MAX_QUALITY_REGRESSION: '0.03'
  SG1_WINDOW_HOURS: '24'
  SG1_MIN_REPORTS: '1'
  SG1_MAX_GLOBAL_ERROR_BUDGET: '0.30'
  SG1_MAX_STEADY_BLOCK_RATIO: '0.20'

jobs:
  backend-fast:
    name: 🐍 Backend Lint + Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dev dependencies
        run: pip install ruff black mypy

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter Check)
        run: black --check --diff .

      - name: Install project dependencies
        run: pip install -e ".[dev]"

      - name: Create minimal test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run Unit Tests (Coverage > 80%)
        run: pytest tests/unit/ --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Phase 5 Step-3 Gate (Circuit Breaker Convergence)
        run: python scripts/validate_step3_circuit_breaker.py --deps llm es neo4j

      - name: Phase 5 Step-6 Drill (SG-007)
        run: python scripts/run_sg007_governance_drills.py --steady-requests 60 --spike-requests 120 --chaos-requests 30 --open-duration-sec 1.0 --max-error-budget ${{ env.SG7_MAX_ERROR_BUDGET }} --max-degrade-trigger-ratio ${{ env.SG7_MAX_DEGRADE_TRIGGER_RATIO }} --max-mttr-sec ${{ env.SG7_MAX_MTTR_SEC }}

      - name: Phase 5 Step-5/6 Cost-Quality Gate (SG-3)
        run: python scripts/validate_step5_sg3_cost_quality.py --samples 200 --baseline premium --min-cost-reduction-ratio ${{ env.SG3_MIN_COST_REDUCTION_RATIO }} --max-quality-regression ${{ env.SG3_MAX_QUALITY_REGRESSION }} --enforce

      - name: Phase 5 GATE-SG-1 Rolling Window
        run: python scripts/validate_gate_sg1_stability_window.py --window-hours ${{ env.SG1_WINDOW_HOURS }} --min-reports ${{ env.SG1_MIN_REPORTS }} --max-global-error-budget ${{ env.SG1_MAX_GLOBAL_ERROR_BUDGET }} --max-steady-block-ratio ${{ env.SG1_MAX_STEADY_BLOCK_RATIO }} --enforce

      - name: Phase 5 Step-7 Gate (Unified Go/No-Go)
        run: python scripts/validate_step7_governance_gates.py --max-error-budget ${{ env.SG7_MAX_ERROR_BUDGET }} --max-steady-block-ratio ${{ env.SG1_MAX_STEADY_BLOCK_RATIO }} --min-run-duration-sec 0 --max-mttr-sec ${{ env.SG7_MAX_MTTR_SEC }} --max-convergence-ms 60000 --max-degrade-trigger-ratio ${{ env.SG7_MAX_DEGRADE_TRIGGER_RATIO }} --enforce

      - name: Upload Step-3 Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step3-cb-report-feature
          path: backend/logs/service_governance/

      - name: Upload Step-6 Drill Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step6-sg007-report-feature
          path: backend/logs/service_governance/sg007_drill_report*

      - name: Upload SG-3 Cost-Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step5-sg3-report-feature
          path: backend/logs/service_governance/step5_sg3_cost_quality_report*

      - name: Upload SG-1 Window Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-sg1-window-report-feature
          path: backend/logs/service_governance/gate_sg1_window_report*

      - name: Upload Step-7 Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step7-gate-report-feature
          path: backend/logs/service_governance/step7_gate_report*

  frontend-fast:
    name: ⚛️ Frontend Lint + TypeCheck + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Theme Hardcode Check
        run: npm run theme:check:ci

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Build Check (确认能构建成功)
        run: npm run build
