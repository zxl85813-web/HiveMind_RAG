# =============================================================================
# Feature CI — 功能分支快速检查
# =============================================================================
# 触发: feature/fix/hotfix → develop 的 PR
# 作用: 快速反馈（Lint + Unit Test + 并行治理门禁），不跑慢速集成/E2E
#
# Job 结构（最大并行）:
#   backend-lint ──────────────────────────────────────────────┐
#   backend-test (needs: backend-lint) ────────────────────────┤─→ governance (needs: backend-test)
#   frontend-fast (独立，与 backend 完全并行) ─────────────────┘
# =============================================================================
name: Feature CI (Fast Check)

on:
  pull_request:
    branches:
      - develop
      - 'release/**'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/feature-ci.yml'
      - '.github/workflows/governance-gates.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── Backend Lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: 🔍 Backend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter Check)
        run: black --check --diff .

  # ── Backend Unit Tests（快速，只跑 unit/）────────────────────────────────
  backend-test:
    name: 🧪 Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run Unit Tests (Coverage > 80%)
        run: pytest tests/unit/ --cov=app --cov-report=term-missing --cov-fail-under=80

  # ── Frontend（与 backend 完全并行）───────────────────────────────────────
  frontend-fast:
    name: ⚛️ Frontend Lint + TypeCheck + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Theme Hardcode Check
        run: npm run theme:check:ci

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Build Check
        run: npm run build

  # ── Governance Gates（并行，调用 reusable workflow）──────────────────────
  governance:
    name: 🛡️ Governance Gates
    needs: backend-test
    uses: ./.github/workflows/governance-gates.yml
    with:
      profile: feature
      artifact_suffix: feature
      run_closure_check: false
