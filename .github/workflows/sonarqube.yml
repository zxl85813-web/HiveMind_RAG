# =============================================================================
# SonarQube 代码质量扫描
# =============================================================================
# 触发:
#   - push 到 develop / main
#   - PR 到 develop / main（增量扫描）
#   - 手动触发
#
# 前置条件 (GitHub Secrets):
#   SONAR_TOKEN     — SonarQube 用户 Token
#   SONAR_HOST_URL  — SonarQube 服务器地址 (如 http://your-server:9000)
#
# 功能:
#   1. 后端 pytest 生成 coverage.xml
#   2. 前端 vitest 生成 lcov.info
#   3. SonarQube Scanner 上传源码 + 覆盖率报告
#   4. Quality Gate 检查（阻断不合格的 PR）
# =============================================================================
name: "🛡️ SonarQube Analysis"

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/src/**'
      - 'sonar-project.properties'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/src/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── 1. 后端覆盖率收集 ────────────────────────────────────────────────────
  backend-coverage:
    name: 🐍 Backend Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube 需要完整 git 历史做增量分析

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run tests with coverage (XML for SonarQube)
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --no-header \
            -p no:allure_pytest \
            -o "addopts="
        # 覆盖 pyproject.toml 的 addopts，只生成 SonarQube 需要的 XML

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: sonar-backend-coverage
          path: backend/coverage.xml

  # ── 2. 前端覆盖率收集 ────────────────────────────────────────────────────
  frontend-coverage:
    name: ⚛️ Frontend Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (LCOV for SonarQube)
        run: npm run test:unit

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: sonar-frontend-coverage
          path: frontend/coverage/lcov.info

  # ── 3. SonarQube 扫描 ────────────────────────────────────────────────────
  sonar-scan:
    name: 🛡️ SonarQube Scan
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-coverage]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: sonar-backend-coverage
          path: backend/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: sonar-frontend-coverage
          path: frontend/coverage/

      - name: Verify coverage files
        run: |
          echo "=== Backend coverage ==="
          ls -la backend/coverage.xml 2>/dev/null && head -5 backend/coverage.xml || echo "NOT FOUND"
          echo ""
          echo "=== Frontend coverage ==="
          ls -la frontend/coverage/lcov.info 2>/dev/null && head -5 frontend/coverage/lcov.info || echo "NOT FOUND"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # ── Quality Gate 检查（PR 时阻断）──────────────────────────────────────
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        if: github.event_name == 'pull_request'
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Summary
        if: always()
        run: |
          echo "## 🛡️ SonarQube Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`${{ secrets.SONAR_HOST_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Project | \`HiveMind_RAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ${{ secrets.SONAR_HOST_URL }}/dashboard?id=HiveMind_RAG |" >> $GITHUB_STEP_SUMMARY
