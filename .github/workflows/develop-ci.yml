# =============================================================================
# Develop CI — develop 分支集成检查
# =============================================================================
# 触发: push 到 develop（功能合并后 & develop 上直接 push）
# 作用: 完整的 Lint + Type + Unit + Integration Test + 并行治理门禁
#
# Job 结构:
#   backend-lint ──────────────────────────────────────────────┐
#   backend-test (needs: backend-lint) ────────────────────────┤─→ governance (needs: backend-test)
#   frontend-full (独立，与 backend 并行) ─────────────────────┘
# =============================================================================
name: Develop CI (Integration Check)

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/develop-ci.yml'
      - '.github/workflows/governance-gates.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── Backend Lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: 🔍 Backend Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter Check)
        run: black --check --diff .

  # ── Backend Type Check（与 test 并行）────────────────────────────────────
  backend-typecheck:
    name: 🔎 Backend Type Check (mypy)
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" && pip install types-aiofiles

      - name: Mypy (Type Check)
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

  # ── Backend Tests（门禁前提）─────────────────────────────────────────────
  backend-test:
    name: 🧪 Backend Full Tests (Unit + Integration)
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run Full Tests (Coverage > 80%)
        run: pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-develop
          path: backend/coverage.xml

  # ── Frontend（与 backend 完全并行）───────────────────────────────────────
  frontend-full:
    name: ⚛️ Frontend Full CI (Lint + Type + Test + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Theme Hardcode Check
        run: npm run theme:check:ci

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Run Tests + Coverage
        run: npm run test:unit

      - name: Production Build
        run: npm run build

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-develop
          path: frontend/coverage/

  # ── Governance Gates（并行，调用 reusable workflow）──────────────────────
  governance:
    name: 🛡️ Governance Gates
    needs: backend-test
    uses: ./.github/workflows/governance-gates.yml
    with:
      profile: develop
      artifact_suffix: develop
      run_closure_check: false
