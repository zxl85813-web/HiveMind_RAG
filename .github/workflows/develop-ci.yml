# =============================================================================
# Develop CI — develop 分支集成检查
# =============================================================================
# 触发: push 到 develop（功能合并后 & develop 上直接 push）
# 作用: 完整的 Lint + Type + Unit + Integration Test
# =============================================================================
name: Develop CI (Integration Check)

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/develop-ci.yml'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend-full:
    name: 🐍 Backend Full CI (Lint + Type + Unit + Integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]" && pip install types-aiofiles

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter Check)
        run: black --check --diff .

      - name: Mypy (Type Check)
        run: mypy app/ --ignore-missing-imports

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run Full Tests (Unit + Integration, Coverage > 80%)
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --alluredir=allure-results \
            -o "addopts="

      - name: OpenAPI Contract Drift Check
        run: |
          python -m scripts.export_openapi --mode all
          if ! git diff --exit-code -- ../shared/openapi/; then
            echo "::error::OpenAPI 契约已过期。请在本地运行 'cd backend; python -m scripts.export_openapi --mode all' 并提交更新。"
            exit 1
          fi

      - name: Neo4j UGG Dynamic Integrity Audit (DES-015 Gates)
        env:
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/governance/sync_pgg.py --all --audit --strict

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-develop
          path: backend/coverage.xml

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-backend-develop
          path: backend/allure-results/
          retention-days: 10

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend-full:
    name: ⚛️ Frontend Full CI (Lint + Type + Test + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npm run typecheck

      - name: Run Tests + Coverage
        run: npm run test:unit

      - name: Production Build
        run: npm run build

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-develop
          path: frontend/coverage/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-frontend-develop
          path: frontend/allure-results/
          retention-days: 10

  # ── Allure 聚合报告 ─────────────────────────────────────────────────────
  allure-report:
    name: 📊 Allure Report
    needs: [backend-full, frontend-full]
    if: always()
    uses: ./.github/workflows/test-report.yml
    with:
      report_suffix: develop
