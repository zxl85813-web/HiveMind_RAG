name: Test SSH Connection

on:
  push:
    branches:
      - main
      - feature/agent-shared-memory

jobs:
  test_connection:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Test
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "成功连上了服务器！"
            hostname
            whoami
