name: Production Deployment & Analysis

on:
  push:
    branches:
      - master
      - develop
      - feature/agent-shared-memory # 准备合入前，保留此触发用于验证 Sonar+Deploy 全流程

jobs:
  sonarQube-analysis:
    name: 🛡️ SonarQube Code Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for SonarQube to analyze history

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

  deploy:
    name: 🚀 Deploy to Azure Server
    needs: sonarQube-analysis # Must pass Sonar scan before deploying
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            PROJECT_DIR="/home/azureuser/HiveMind_RAG"
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/zxl85813-web/HiveMind_RAG.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            git fetch origin
            DEPLOY_BRANCH=${GITHUB_REF##*/}
            git checkout $DEPLOY_BRANCH
            git pull origin $DEPLOY_BRANCH
            
            # --- Container Management ---
            # If backend/.env.production doesn't exist, use .env.example
            if [ ! -f "backend/.env.production" ]; then
              cp backend/.env.example backend/.env.production
              echo "Created default backend/.env.production from example"
            fi
            
            # Rebuild and restart all services using Docker Compose V2
            echo "Checking Docker version..."
            docker version
            docker compose version
            
            echo "Building and restarting containers..."
            # 使用 docker compose (V2)
            # 先停止并清理旧容器，防止重名冲突 (Conflict)
            docker compose -f docker-compose.prod.yml down --remove-orphans
            
            # 重新构建并后台启动
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            
            # --- Database Migration ---
            # 启动后自动同步数据库表结构
            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            
            # Cleanup old unused images and builder cache to save space
            docker image prune -f
            docker builder prune -f
            
            echo "Deployment finished successfully on $(hostname) with branch $DEPLOY_BRANCH"

      - name: Send Feishu Notification (Success)
        if: success() && env.FEISHU_APP_ID != ''
        run: |
          # 1. 申请飞书 App 临时通行令牌 Token
          TOKEN_RESP=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}")
          TOKEN=$(echo $TOKEN_RESP | jq -r '.tenant_access_token')
          
          # 2. 用 jq 安全构建 JSON 载荷，防止提交日志中的引号或特殊符号打乱 JSON 结构
          jq -n \
            --arg receive_id "$FEISHU_USER_EMAIL" \
            --arg msg_type "interactive" \
            --arg content "{\"config\":{\"wide_screen_mode\":true},\"header\":{\"title\":{\"tag\":\"plain_text\",\"content\":\"🚀 HiveMind RAG 部署成功通知\"},\"template\":\"green\"},\"elements\":[{\"tag\":\"div\",\"text\":{\"tag\":\"lark_md\",\"content\":\"**状态**: ✅ 部署成功\\n**分支**: \`${{ github.ref_name }}\`\\n**提交者**: \`${{ github.actor }}\`\\n**提交信息**: \`${{ github.event.head_commit.message }}\`\\n**链接详情**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}]}" \
            '{receive_id: $receive_id, msg_type: $msg_type, content: $content}' > payload.json

          # 3. 私信给指定的飞书用户邮箱
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=email" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @payload.json
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_EMAIL: ${{ secrets.FEISHU_USER_EMAIL }}

      - name: Send Feishu Notification (Failure)
        if: failure() && env.FEISHU_APP_ID != ''
        run: |
          # 1. 申请飞书 App 临时通行令牌 Token
          TOKEN_RESP=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}")
          TOKEN=$(echo $TOKEN_RESP | jq -r '.tenant_access_token')
          
          # 2. 安全构建 JSON 载荷
          jq -n \
            --arg receive_id "$FEISHU_USER_EMAIL" \
            --arg msg_type "interactive" \
            --arg content "{\"config\":{\"wide_screen_mode\":true},\"header\":{\"title\":{\"tag\":\"plain_text\",\"content\":\"❌ HiveMind RAG 部署失败通知\"},\"template\":\"red\"},\"elements\":[{\"tag\":\"div\",\"text\":{\"tag\":\"lark_md\",\"content\":\"**状态**: ❌ 部署失败\\n**分支**: \`${{ github.ref_name }}\`\\n**提交者**: \`${{ github.actor }}\`\\n**链接详情**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}}]}" \
            '{receive_id: $receive_id, msg_type: $msg_type, content: $content}' > payload.json

          # 3. 私信给指定的飞书用户邮箱
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=email" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @payload.json
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_EMAIL: ${{ secrets.FEISHU_USER_EMAIL }}
