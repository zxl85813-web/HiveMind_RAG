name: Production Deployment & Analysis

on:
  push:
    branches:
      - master
      - feature/agent-shared-memory # 准备合入前，保留此触发用于验证 Sonar+Deploy 全流程

jobs:
  sonarQube-analysis:
    name: 🛡️ SonarQube Code Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for SonarQube to analyze history

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  deploy:
    name: 🚀 Deploy to Azure Server
    needs: sonarQube-analysis # 恢复依赖：必须先过扫描，才开始部署
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            PROJECT_DIR="/home/azureuser/HiveMind_RAG"
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/zxl85813-web/HiveMind_RAG.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            git fetch origin
            # 这里我加了一个逻辑：如果是 master 推送就部署 master，如果是 feature 推送就部署 feature
            DEPLOY_BRANCH=${GITHUB_REF##*/}
            git checkout $DEPLOY_BRANCH
            git pull origin $DEPLOY_BRANCH
            
            # TODO: 如果需要重启服务，请取消注释下面这行
            # docker-compose up -d --build
            
            echo "Deployment finished successfully on $(hostname) with branch $DEPLOY_BRANCH"
