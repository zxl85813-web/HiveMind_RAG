name: Production Deployment & Analysis

on:
  push:
    branches:
      - main # Only deploy when code is merged into main

jobs:
  sonarQube-analysis:
    name: 🛡️ SonarQube Code Quality Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for SonarQube to analyze history

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Typically http://48.217.153.122:9000

  deploy:
    name: 🚀 Deploy to Azure Server
    needs: sonarQube-analysis # Must pass Sonar scan before deploying
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Check if directory exists, if not clone (initial setup)
            PROJECT_DIR="/home/azureuser/HiveMind_RAG"
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/zxl85813-web/HiveMind_RAG.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            git checkout main
            git pull origin main
            
            # Restart services (Adjust this based on your actual compose or run command)
            # docker-compose up -d --build
            echo "Deployment finished successfully on $(hostname)"
