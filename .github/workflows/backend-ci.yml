# =============================================================================
# Backend Production Gate — main 分支最终门禁
# =============================================================================
# 触发: push 到 main（PR 检查由 feature-ci / develop-ci / release-ci 承担）
# 作用: 确保主干始终是可构建、可部署的干净状态
#
# Job 结构（全部并行）:
#   lint ──────────────────────────────────────────────────────┐
#   typecheck (needs: lint) ───────────────────────────────────┤
#   test (needs: lint) ────────────────────────────────────────┤─→ governance (needs: test)
#   governance-gates [reusable, 5并行+Step7] (needs: test) ───┘
# =============================================================================
name: Backend Production Gate

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/governance-gates.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Lint（最快，先跑，阻断后续）──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter)
        run: black --check --diff .

  # ── Type Check（与 test 并行，informational only）────────────────────────
  typecheck:
    name: 🔎 Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" && pip install types-aiofiles types-redis

      - name: Mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true
        # informational only — strict=false due to incomplete third-party stubs

  # ── Unit Tests + Coverage（门禁的前提）──────────────────────────────────
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-main
          path: backend/coverage.xml

  # ── Governance Gates（并行，调用 reusable workflow）──────────────────────
  governance:
    name: 🛡️ Governance Gates
    needs: test
    uses: ./.github/workflows/governance-gates.yml
    with:
      profile: main
      artifact_suffix: main
      run_closure_check: true   # main 分支需要 Closure Readiness 检查
