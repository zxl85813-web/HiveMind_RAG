# Production Gate — main 分支的后端最终门禁
# 只在代码合入 main 后触发 (PR 检查由 feature-ci / develop-ci / release-ci 承担)
# 作用: 确保主干始终是可构建、可部署的干净状态
name: Backend Production Gate

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install ruff black mypy

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter)
        run: black --check --diff .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install types-aiofiles types-redis

      - name: Mypy
        run: mypy app/ --ignore-missing-imports
        # Note: --ignore-missing-imports is used initially
        # until all stubs are properly installed. Gradually remove.

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create minimal .env for test
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
