# Production Gate — main 分支的后端最终门禁
# 只在代码合入 main 后触发 (PR 检查由 feature-ci / develop-ci / release-ci 承担)
# 作用: 确保主干始终是可构建、可部署的干净状态
name: Backend Production Gate

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  PYTHON_VERSION: '3.11'
  SG7_MAX_ERROR_BUDGET: '0.60'
  SG7_MAX_DEGRADE_TRIGGER_RATIO: '0.70'
  SG7_MAX_MTTR_SEC: '60'
  SG3_MIN_COST_REDUCTION_RATIO: '0.12'
  SG3_MAX_QUALITY_REGRESSION: '0.02'
  SG1_WINDOW_HOURS: '24'
  SG1_MIN_REPORTS: '1'
  SG1_MAX_GLOBAL_ERROR_BUDGET: '0.25'
  SG1_MAX_STEADY_BLOCK_RATIO: '0.10'
  STEP7_CLOSURE_MIN_SG1_PASS_COUNT: '1'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install ruff black mypy

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter)
        run: black --check --diff .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install types-aiofiles types-redis

      - name: Mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true
        # Note: mypy check is informational only (continue-on-error: true)
        # Project uses strict=false in pyproject.toml due to incomplete stubs
        # from third-party libraries (langchain, sqlalchemy, etc.)

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create minimal .env for test
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Phase 5 Step-3 Gate (Circuit Breaker Convergence)
        run: python scripts/validate_step3_circuit_breaker.py --deps llm es neo4j

      - name: Phase 5 Step-6 Drill (SG-007)
        run: python scripts/run_sg007_governance_drills.py --steady-requests 200 --spike-requests 400 --chaos-requests 120 --open-duration-sec 1.5 --max-error-budget ${{ env.SG7_MAX_ERROR_BUDGET }} --max-degrade-trigger-ratio ${{ env.SG7_MAX_DEGRADE_TRIGGER_RATIO }} --max-mttr-sec ${{ env.SG7_MAX_MTTR_SEC }}

      - name: Phase 5 Step-5/6 Cost-Quality Gate (SG-3)
        run: python scripts/validate_step5_sg3_cost_quality.py --samples 400 --baseline premium --min-cost-reduction-ratio ${{ env.SG3_MIN_COST_REDUCTION_RATIO }} --max-quality-regression ${{ env.SG3_MAX_QUALITY_REGRESSION }} --enforce

      - name: Phase 5 GATE-SG-1 Rolling Window
        run: python scripts/validate_gate_sg1_stability_window.py --window-hours ${{ env.SG1_WINDOW_HOURS }} --min-reports ${{ env.SG1_MIN_REPORTS }} --max-global-error-budget ${{ env.SG1_MAX_GLOBAL_ERROR_BUDGET }} --max-steady-block-ratio ${{ env.SG1_MAX_STEADY_BLOCK_RATIO }} --enforce

      - name: Phase 5 Step-7 Gate (Unified Go/No-Go)
        run: python scripts/validate_step7_governance_gates.py --max-error-budget ${{ env.SG7_MAX_ERROR_BUDGET }} --max-steady-block-ratio ${{ env.SG1_MAX_STEADY_BLOCK_RATIO }} --min-run-duration-sec 0 --max-mttr-sec ${{ env.SG7_MAX_MTTR_SEC }} --max-convergence-ms 60000 --max-degrade-trigger-ratio ${{ env.SG7_MAX_DEGRADE_TRIGGER_RATIO }} --enforce

      - name: Phase 5 Step-7 Closure Readiness
        run: python scripts/validate_step7_closure_readiness.py --sg1-window-hours ${{ env.SG1_WINDOW_HOURS }} --sg1-min-pass-count ${{ env.STEP7_CLOSURE_MIN_SG1_PASS_COUNT }} --enforce

      - name: 🛡️ Architecture & Observability Audit
        run: python scripts/sync_registry.py --enforce --max-unregistered 160 --max-unmonitored 180

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Upload Step-3 Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step3-cb-report-main
          path: backend/logs/service_governance/

      - name: Upload Step-6 Drill Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step6-sg007-report-main
          path: backend/logs/service_governance/sg007_drill_report*

      - name: Upload SG-3 Cost-Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step5-sg3-report-main
          path: backend/logs/service_governance/step5_sg3_cost_quality_report*

      - name: Upload SG-1 Window Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-sg1-window-report-main
          path: backend/logs/service_governance/gate_sg1_window_report*

      - name: Upload Step-7 Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step7-gate-report-main
          path: backend/logs/service_governance/step7_gate_report*

      - name: Upload Step-7 Closure Readiness Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: step7-closure-readiness-report-main
          path: backend/logs/service_governance/step7_closure_readiness_report*
