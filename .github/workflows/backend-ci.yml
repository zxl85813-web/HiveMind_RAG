# =============================================================================
# Backend Production Gate — main 分支最终门禁
# =============================================================================
# 触发: push 到 main
# 作用: 确保主干始终是可构建、可部署的干净状态
# =============================================================================
name: Backend Production Gate

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install ruff black mypy

      - name: Ruff (Linter)
        run: ruff check . --output-format=github

      - name: Black (Formatter)
        run: black --check --diff .

  typecheck:
    name: 🔎 Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install types-aiofiles types-redis

      - name: Mypy
        run: mypy app/ --ignore-missing-imports

  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create minimal .env for test
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            --alluredir=allure-results \
            -o "addopts="

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-main
          path: backend/coverage.xml

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-backend-main
          path: backend/allure-results/
          retention-days: 30

  # ── Allure 聚合报告 ─────────────────────────────────────────────────────
  allure-report:
    name: 📊 Allure Report
    needs: test
    if: always()
    uses: ./.github/workflows/test-report.yml
    with:
      report_suffix: main

  # ── OpenAPI 契约漂移检测 ────────────────────────────────────────────────
  openapi-contract:
    name: 📜 OpenAPI Contract Drift
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create minimal .env for import
        run: |
          cat > .env << 'EOF'
          APP_NAME="HiveMind RAG Test"
          DEBUG=true
          DATABASE_URL=sqlite+aiosqlite:///./test.db
          VECTOR_STORE_TYPE=chroma
          LLM_PROVIDER=siliconflow
          LLM_API_KEY=sk-test
          LLM_MODEL=test-model
          LLM_BASE_URL=https://example.com/v1
          SECRET_KEY=ci-test-secret-key
          EOF

      - name: Regenerate OpenAPI contracts
        run: python -m scripts.export_openapi --mode all

      - name: Detect drift in shared/openapi/*.json
        run: |
          if ! git diff --exit-code -- ../shared/openapi/; then
            echo "::error::OpenAPI 契约已过期。请在本地运行 'cd backend; python -m scripts.export_openapi --mode all' 并提交更新。"
            exit 1
          fi
