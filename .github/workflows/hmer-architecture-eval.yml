name: HMER Architecture Evaluation (E2E Stress)

on:
  workflow_dispatch: # 允许手动触发
  push:
    branches: [main]
    paths:
      - 'frontend/src/core/stream/**'
      - 'frontend/src/hooks/useChat.ts'
      - 'frontend/tests/e2e/architecture/**'

jobs:
  architecture-eval:
    name: HMER Extreme Stress & Resilience Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # --- 1. 后端环境准备 (用于支撑前端请求，除非全部 Mock) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e "."

      - name: Start Background Backend
        env:
          # 🛰️ 关键点：从 GitHub Secrets 注入生产或测试用的 LLM Key
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'siliconflow' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-ai/DeepSeek-V3' }}
          DATABASE_URL: sqlite+aiosqlite:///./hmer_eval.db
        run: |
          cd backend
          # 启动后端并置于后台
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          sleep 5 # 等待启动完成

      # --- 2. 前端环境准备 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Build and Start Frontend (Preview Mode)
          # 使用 127.0.0.1 避免 IPv6 导致的连接问题，并补全 /api/v1 路径
          VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
        run: |
          cd frontend
          npm run build
          # 使用 preview 模式启动并置于后台
          nohup npx vite preview --port 5173 > frontend.log 2>&1 &
          sleep 15 # CI 机器较慢，给予充足启动时间

      # --- 3. 执行 HMER 架构评测四部曲 ---
      - name: Run HMER Capacity Stress (Phase 1)
        run: |
          cd frontend
          npx playwright test tests/e2e/architecture/capacity-indexeddb.spec.ts

      - name: Run HMER Chaos Engineering (Phase 2)
        run: |
          cd frontend
          npx playwright test tests/e2e/architecture/chaos-network-interceptor.spec.ts

      - name: Run HMER Endurance & Memory (Phase 3)
        run: |
          cd frontend
          npx playwright test tests/e2e/architecture/endurance-memory-leak.spec.ts

      - name: Run HMER Telemetry Audit (Phase 4)
        run: |
          cd frontend
          npx playwright test tests/e2e/architecture/telemetry-audit.spec.ts

      # --- 4. 生成与上传报告 ---
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hmer-architecture-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
            backend/backend.log
            frontend/frontend.log
          retention-days: 7
