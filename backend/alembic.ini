[alembic]
# 告诉 alembic 指令在哪里找到 env.py 
script_location = alembic

# 模型连接串 — 通常会被 env.py 中的配置覆盖 (使用 settings.DATABASE_URL)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/hivemind

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
