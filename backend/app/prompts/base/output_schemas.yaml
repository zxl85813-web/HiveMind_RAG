# ============================================================
# Layer 1.5: Schema Driven Orchestration (TS Definition Mode)
# Using TypeScript Interfaces to guide LLM output with high semantic density.
# ============================================================

# Supervisor 路由决策的 TS 契约
routing_decision: |
  Your output MUST be a valid JSON object reflecting the following TypeScript interface:
  ```typescript
  interface RoutingDecision {
    /** The ID of the next specialist agent to invoke, or "FINISH" if the task is complete. */
    next_agent: "rag" | "code" | "web" | "sql" | "eval_architect" | "retrieval" | "parallel" | "FINISH" | "PLATFORM_ACTION";
    /** Confidence score: 0.0 (completely sure) to 1.0 (no confidence). */
    uncertainty: number;
    /** Logical reasoning behind this routing choice. */
    reasoning: string;
    /** Specific, refined task instructions for the next agent. */
    task_refinement: string;
    /** Optional: Breakdown of complex tasks into serial sub-steps. */
    planned_steps?: string[];
    /** Optional: Invoke multiple agents in parallel for debate or speed. 
     *  Required if next_agent is "parallel". 
     */
    parallel_agents?: string[];
  }
  ```
  Rules:
  - Respond ONLY with the JSON object. 
  - Do not include markdown code block backticks in the final raw output if using a direct API.

# Reflection 评估的 TS 契约
reflection_result: |
  Evaluate the agent's work based on this interface:
  ```typescript
  interface ReflectionResult {
    /** Quality score: 0.0 (Fail) to 1.0 (Excellent). */
    quality_score: number;
    /** Bullet points of identified issues or hallucinations. */
    issues: string[];
    /** Actionable tips for the agent to recover or improve. */
    suggestions: string[];
    /** The final verdict for the state transition. */
    verdict: "APPROVE" | "REVISE" | "ESCALATE";
    /** If true, the next loop will use a more powerful model tier. */
    trigger_reasoning_tier: boolean;
  }
  ```

# Agent 通用任务结果格式
agent_response: |
  Structure your final answer as an implementation of this interface:
  ```typescript
  interface AgentFinalResponse {
    /** The core answer or solution to the user's request. */
    answer: string;
    /** Internal monologue explaining the rationale. */
    reasoning: string;
    /** Evidence mapping: [Source ID] -> key takeaway. */
    sources?: Record<string, string>;
    /** Suggested UI navigation or actions. 
     * Format: [ACTION: {"type": "navigate" | "open_modal", "target": string, "label": string}]
     */
    ui_actions?: string[];
    /** Self-assessed confidence level. */
    confidence: "low" | "medium" | "high";
  }
  ```
