version: '3.9'

services:
  # === Database (PostgreSQL) ===
  postgres:
    image: postgres:16-alpine
    container_name: hivemind-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # No ports exposed to host to avoid conflicts
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d hivemind -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 15

  # === Cache (Redis) ===
  redis:
    image: redis:7-alpine
    container_name: hivemind-redis-prod
    restart: always
    # No ports exposed to host
    volumes:
      - redis_data_prod:/data

  # === Vector Store (ChromaDB) ===
  chroma:
    image: chromadb/chroma:latest
    container_name: hivemind-chroma-prod
    restart: always
    # No ports exposed to host
    volumes:
      - chroma_data_prod:/chroma/chroma

  # === Object Store (MinIO) ===
  minio:
    image: minio/minio:latest
    container_name: hivemind-minio-prod
    restart: always
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9010:9000" # Keep MinIO access if needed for management
      - "9011:9011"
    volumes:
      - minio_data_prod:/data

  # === Backend (FastAPI) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hivemind-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chroma:
        condition: service_started
      minio:
        condition: service_started
    # Remove ports for background access, now proxied by frontend
    # env_file:
    #   - ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hivemind
      REDIS_URL: redis://redis:6379/0
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hivemind
      APP_ENV: production
      DEBUG: "false"
      VECTOR_STORE_TYPE: chroma
      CHROMA_HOST: chroma
      PYTHONPATH: .
      SECRET_KEY: ${SECRET_KEY:-hivemind_production_secret_key_change_me}
    command: >
      sh -c "mkdir -p storage uploads && python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8888"
    # Healthcheck: Docker 每 10s 检查一次，确认 backend 真正就绪后才允许 frontend 启动
    # 使用 python stdlib urllib，避免 runtime 镜像中无 curl 的问题
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api/v1/health/')" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  # === Frontend (React / Vite / Nginx) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hivemind-frontend-prod
    restart: always
    ports:
      - "80:80"
    # 等待 backend 健康检查通过后才启动，确保 Nginx 能解析到 backend 主机名
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data_prod:
  redis_data_prod:
  chroma_data_prod:
  minio_data_prod:
