version: '3.9'

services:
  # === Database (PostgreSQL) ===
  postgres:
    image: postgres:16-alpine
    container_name: hivemind-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d hivemind -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 15

  # === Cache (Redis) ===
  redis:
    image: redis:7-alpine
    container_name: hivemind-redis-prod
    restart: always
    volumes:
      - redis_data_prod:/data

  # === Vector Store (ChromaDB) ===
  chroma:
    image: chromadb/chroma:latest
    container_name: hivemind-chroma-prod
    restart: always
    volumes:
      - chroma_data_prod:/chroma/chroma

  # === Object Store (MinIO) ===
  minio:
    image: minio/minio:latest
    container_name: hivemind-minio-prod
    restart: always
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - minio_data_prod:/data

  # === Backend (FastAPI) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hivemind-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chroma:
        condition: service_started
      minio:
        condition: service_started
    environment:
      ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hivemind
      REDIS_URL: redis://redis:6379/0
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hivemind
      SECRET_KEY: ${SECRET_KEY:-hivemind-prod-secret-fallback-888}
      VECTOR_STORE_TYPE: chroma
      CHROMA_HOST: chroma
      EMBEDDING_PROVIDER: zhipu
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      LLM_PROVIDER: siliconflow
      LLM_API_KEY: ${LLM_API_KEY:-}
      PYTHONPATH: /app
    volumes:
      - ./logs/backend:/app/logs
      - ./storage:/app/storage
    command: >
      sh -c "echo '--- Starting Backend Diagnostics ---' &&
             mkdir -p storage uploads logs &&
             echo 'Checking connection to postgres:5432...' &&
             until nc -z postgres 5432; do
               echo 'Waiting for postgres...';
               sleep 2;
             done &&
             echo 'Database is reachable. Running migrations...' &&
             python -m alembic upgrade head &&
             echo 'Migrations finished successfully. Starting Uvicorn...' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/api/v1/health/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # === Frontend (React / Vite / Nginx) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hivemind-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data_prod:
  redis_data_prod:
  chroma_data_prod:
  minio_data_prod:
