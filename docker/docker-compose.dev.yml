version: '3.9'

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: hivemind-postgres
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # === Redis ===
  redis:
    image: redis:7-alpine
    container_name: hivemind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # === ChromaDB (Vector Store — for development) ===
  chroma:
    image: chromadb/chroma:latest
    container_name: hivemind-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # === MinIO (Object Storage — for document files) ===
  minio:
    image: minio/minio:latest
    container_name: hivemind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  minio_data:
